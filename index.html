<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Planners Pro – Concierge · Vera</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #ffffff;
    --warm-white: #ffffff;
    --gold: #8ab4c4;
    --gold-light: #c5dde6;
    --gold-dark: #4a8a9f;
    --charcoal: #1e2d35;
    --charcoal-mid: #3a5060;
    --charcoal-light: #7a9aaa;
    --border: rgba(138,180,196,0.3);
    --border-soft: rgba(138,180,196,0.15);
    --shadow: 0 4px 32px rgba(30,45,53,0.07);
    --radius: 16px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #f0f7fa;
    color: var(--charcoal);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
  }

  .header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--charcoal);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dark);
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 300;
    color: var(--charcoal-light);
  }

  .status-dot::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #7cb87c;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── MESSAGES AREA ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    align-content: flex-start;
    padding: 28px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
    min-height: 0;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 2px; }

  /* ── MESSAGES ── */
  .msg {
    display: flex;
    gap: 12px;
    max-width: 680px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    margin-top: 2px;
  }

  .msg.bot .avatar {
    background: none;
    border: 1.5px solid var(--gold);
    overflow: hidden;
    padding: 0;
  }
  .msg.bot .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .msg.user .avatar {
    background: var(--charcoal);
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
  }

  .bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
    font-weight: 300;
    max-width: calc(100% - 46px);
  }

  .msg.bot .bubble {
    background: var(--warm-white);
    border: 1px solid var(--border-soft);
    color: var(--charcoal);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }

  .msg.user .bubble {
    background: var(--charcoal);
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .bubble strong { font-weight: 600; color: var(--gold-dark); }
  .bubble em { font-style: italic; color: var(--charcoal-mid); }

  /* CTA button inside bubble */
  .cta-btn {
    display: inline-block;
    margin-top: 14px;
    padding: 11px 22px;
    background: var(--gold);
    color: var(--charcoal);
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  .cta-btn:hover { background: var(--gold-dark); color: white; transform: translateY(-1px); }

  /* ── QUICK REPLIES ── */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 0 14px;
    animation: fadeUp 0.35s ease both;
  }

  .qr {
    padding: 8px 15px;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 400;
    color: var(--charcoal-mid);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    white-space: nowrap;
  }

  .qr:hover {
    border-color: var(--gold);
    color: var(--gold-dark);
    background: rgba(201,169,110,0.07);
  }

  /* ── TYPING INDICATOR ── */
  .typing-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── INPUT AREA ── */
  .input-area {
    border-top: 1px solid var(--border-soft);
    background: var(--warm-white);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: #f0f7fa;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 18px;
    transition: border-color 0.2s;
    gap: 8px;
  }

  .input-wrap:focus-within { border-color: var(--gold); }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--charcoal);
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--charcoal-light); }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s;
  }

  .send-btn:hover { background: var(--gold-dark); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .input-hint {
    text-align: center;
    font-size: 10.5px;
    font-weight: 300;
    color: var(--charcoal-light);
    letter-spacing: 0.04em;
    padding-bottom: 6px;
    padding-top: 2px;
  }

  /* ── WELCOME ── */
  .welcome-header {
    text-align: center;
    padding: 12px 20px 0;
  }

  .welcome-header span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--gold-dark);
    letter-spacing: 0.06em;
  }

  /* Decorative divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0 8px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span { font-size: 11px; color: var(--charcoal-light); font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }

  @media (max-width: 520px) {
    header { padding: 0 16px; }
    .messages { padding: 20px 14px 12px; }
    .quick-replies { padding-left: 14px; }
    .bubble { font-size: 13.5px; }
    .input-area { padding: 12px 14px; }
  }
</style>
</head>

5 giorni di lezioni immersive in aula con il Metodo di Roberta Torresan.

PER CHI SONO I CORSI

Il Corso Principles fa per te se:
- Hai ambizione, forza di volontà, motivazione
- Vuoi passare dai sogni agli obiettivi reali
- Cerchi una guida esperta con supporto concreto anche dopo il corso

- Desideri realizzazione personale, indipendenza, riconoscimento professionale

COSA RENDE WEDDING PLANNERS PRO DIVERSA (argomenti anti-fuffa)

In Italia esistono molti corsi improvvisati. Wedding Planners Pro è diversa perché:

• Il docente È una wedding planner di successo attiva nel settore, non qualcuno che ha smesso di lavorare per fare corsi
• Non ci sono promesse esagerate: nessun "diventa wedding planner in un weekend"
• C'è un metodo di lavoro testato, non solo slide e frasi motivazionali
• È previsto uno stage pratico su eventi reali, non solo teoria
• C'è assistenza prima, durante e dopo il corso con Tutor dedicato
• Esiste una rete professionale in cui entrare dopo il corso
• L'attestato ha il nome di Roberta Torresan, che ha valore reale nel settore (in Italia non esiste un albo ufficiale, ma la reputazione di chi firma conta tutto)
• I prezzi riflettono la qualità: i corsi low-cost spesso non hanno interazione con i docenti, nessun supporto, materiali generici

SEGNALI DA EVITARE IN ALTRI CORSI (informazioni utili per chi sta valutando)

• Nessun docente dichiarato
• Promesse tipo "guadagna subito" o "diventa planner in 2 giorni"
• Nessun metodo di lavoro strutturato
• Solo teoria, niente pratica o stage
• Prezzi sospettosamente bassi
• Attestato come unico argomento di vendita
• Nessun portfolio reale del docente
• Recensioni tutte uguali e generiche, senza trasformazioni concrete

COME RISPONDERE

Tono: caldo, diretto, incoraggiante. Come una mentore che ti vuole bene ma non ti racconta favole.

REGOLE FONDAMENTALI:
- Risposte brevissime: MAX 2 frasi + domanda finale. Niente liste, niente paragrafi.
- Chiudi SEMPRE con una domanda semplice per far proseguire la conversazione.
- Non inventare mai informazioni non presenti qui sopra.
- Usa sempre "tu". Rispondi sempre in italiano.
- Se chiede prezzi: di' che si approfondiscono nella call gratuita con il tutor.

DATE E SEDE:
- Tutti i corsi si tengono a Roma e accolgono persone da tutta Italia.
- Il Corso Principles si tiene ad aprile e a novembre ogni anno.
- Se chiedono date esatte o posti disponibili: rimanda alla call con il tutor.

CHI HA GIÀ ESPERIENZA:

- Un corso low-cost spesso significa nessuna interazione reale, materiali generici, nessun supporto dopo.
- Nel wedding planning la reputazione di chi ti ha formato conta moltissimo: i clienti e i fornitori lo riconoscono.
- Vale la pena spostarsi una volta per imparare da chi lavora davvero nel settore ad alto livello.

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function showQuickReplies(set) {
  // remove old
  document.querySelectorAll('.quick-replies').forEach(e => e.remove());
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  set.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'qr';
    btn.textContent = label;
    btn.onclick = () => {
      wrap.remove();
      send(label);
    };
    wrap.appendChild(btn);
  });
  messagesEl.appendChild(wrap);
  scrollBottom();
}

async function callClaude(userMessage) {
  history.push({ role: 'user', content: userMessage });

  const response = await fetch('/.netlify/functions/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: KNOWLEDGE,
      messages: history
    })
  });

  if (!response.ok) throw new Error('Errore API');

  const data = await response.json();
  const reply = data.content?.[0]?.text || "Mi dispiace, non ho capito. Puoi ripetere?";
  history.push({ role: 'assistant', content: reply });
  return reply;
}

// ── SEND ──
async function send(text) {
  const msg = (text || userInput.value).trim();
  if (!msg || isLoading) return;

  userInput.value = '';
  userInput.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;
  document.querySelectorAll('.quick-replies').forEach(e => e.remove());

  addMessage('user', msg);
  const typingEl = showTyping();

  try {
    const reply = await callClaude(msg);
    removeTyping();

    // CTA button only when Claude includes the link in the reply
    const showCTA = reply.includes('link.delera.co');
    addMessage('bot', reply, showCTA);
    showQuickReplies(history.length <= 3 ? QUICK_SETS.welcome : QUICK_SETS.afterFirst);
  } catch (e) {
    removeTyping();
    addMessage('bot', 'Ops, qualcosa non ha funzionato. Riprova tra un momento oppure contattaci direttamente.');
  }

  isLoading = false;
  sendBtn.disabled = false;
}

// ── INPUT AUTO-RESIZE ──
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
});

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

sendBtn.addEventListener('click', () => send());

// ── WELCOME MESSAGE ──
setTimeout(() => {
  addMessage('bot', `Ciao! Sono **Vera**, il concierge di Wedding Planners Pro. Sono qui per aiutarti a capire se la carriera da **wedding planner** fa per te e accompagnarti in questo percorso.\n\nSono tante le domande che si fanno all'inizio: da dove si comincia? Serve esperienza? Quanto ci vuole? È un lavoro vero?\n\nDimmi pure cosa ti frulla in testa — sono qui per risponderti senza filtri. 🌸`);
  showQuickReplies(QUICK_SETS.welcome);
}, 600);
</script>
